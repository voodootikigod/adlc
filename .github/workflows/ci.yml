name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install
        run: npm install

      - name: Test
        run: npm test

  rails-guard:
    # The unbypassable commit-time backstop for the in-session rail hook: rejects
    # a PR whose diff touches a frozen rail, including via shell write forms the
    # hook does not recognize. No-ops when no rails are declared.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0 # full history so the diff base resolves

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20

      - name: Install
        run: npm install

      - name: Fetch base ref
        run: git fetch --no-tags origin ${{ github.base_ref || 'main' }}

      - name: Rail-freeze gate
        run: node scripts/rails-guard-ci.mjs "origin/${{ github.base_ref || 'main' }}"
