# ADLC rail-freeze CI backstop — copy into your repo as
# .github/workflows/adlc-rails-guard.yml
#
# This is the unbypassable commit-time gate the in-session PreToolUse rail hook
# relies on. The hook blocks Edit/Write/MultiEdit and common Bash writes to
# frozen rails, but a shell write form it does not recognize (node -e, python,
# cp, perl -i, …) still lands in the PR diff — this job rejects that PR.
#
# It reads every rail glob declared in .adlc/tickets.json and runs the
# diff-based `adlc rails-guard` gate against the PR base. It no-ops when no rails
# are declared. Make this a required check in branch protection.

name: ADLC Rails Guard

on:
  pull_request:

permissions:
  contents: read

jobs:
  rails-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the diff base resolves

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install the ADLC toolkit
        # Pinned to an exact, audited version (not mutable `@latest`) on a runner
        # with repo access. Bump deliberately after reviewing the release.
        # `--ignore-scripts` blocks install-time scripts; the CLIs are zero-dep.
        run: npm install -g --ignore-scripts @adlc/cli@1.0.2

      - name: Fetch base ref
        run: git fetch --no-tags origin "${{ github.base_ref }}"

      - name: Rail-freeze gate
        run: |
          node -e '
            const { spawnSync } = require("child_process");
            const base = "origin/" + (process.env.BASE_REF || "main");
            const fail = (m) => { console.error("rails-guard-ci: " + m); process.exit(1); };
            // Read the TRUSTED base ticket file, not the PR working tree (which a
            // PR could edit to remove rails and self-disable this gate).
            const show = spawnSync("git", ["show", base + ":.adlc/tickets.json"], { encoding: "utf8" });
            if (show.status !== 0) { console.log("no .adlc/tickets.json at " + base + " — nothing frozen."); process.exit(0); }
            let d; try { d = JSON.parse(show.stdout); } catch (e) { fail("cannot parse base tickets: " + e.message); }
            if (!d || typeof d !== "object" || Array.isArray(d) || !Array.isArray(d.tickets)) fail("base tickets not in { tickets: [...] } shape");
            const rails = [];
            for (const t of d.tickets) {
              if (!t || typeof t !== "object" || Array.isArray(t)) fail("malformed base ticket entry");
              if (t.rails !== undefined && !Array.isArray(t.rails)) fail("non-array base rails");
              for (const r of t.rails ?? []) { if (typeof r !== "string") fail("non-string base rail"); rails.push(r); }
            }
            const u = [...new Set(rails)];
            if (!u.length) { console.log("no rails declared at base — nothing frozen."); process.exit(0); }
            u.push(".adlc/tickets.json"); // trust root is frozen once rails exist
            const argv = ["rails-guard", "--base", base, ...u.flatMap(r => ["--rails", r])];
            const res = spawnSync("adlc", argv, { stdio: "inherit" });
            process.exit(typeof res.status === "number" ? res.status : 1);
          '
        env:
          BASE_REF: ${{ github.base_ref }}
