# ADLC scheduled maintenance — copy into your repo as
# .github/workflows/adlc-maintenance.yml
#
# Idle-time metabolism (ADLC C10/C12): the DETERMINISTIC, keyless maintenance
# checks on a weekly cron. It reports stale skill metadata and the highest-churn
# files worth re-prosecuting, into the job summary. Findings are ADVISORY — stale
# skills or hot files keep the run GREEN (treat the summary as a worklist) — but a
# genuine tool CRASH (command-not-found, regression) FAILS the run so the broken
# pipeline is not silently swallowed.
#
# The LLM-backed parts (lesson-foundry, rejection-mining, gate-fuzzing) are not
# here because they need a model. Run those via a scheduled Claude routine that
# invokes /adlc-distill and /adlc-maintain (Claude is the model — no API keys).

name: ADLC Maintenance

on:
  schedule:
    - cron: "0 6 * * 1" # 06:00 UTC every Monday
  workflow_dispatch: {} # allow manual runs

permissions:
  contents: read

jobs:
  maintenance:
    runs-on: ubuntu-latest
    steps:
      # Actions are pinned to full commit SHAs (not floating tags) for the same
      # supply-chain reason as the npm pin below. Refresh deliberately (e.g. via
      # Dependabot/Renovate PRs).
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0 # full history so churn (model-ratchet) is meaningful

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20

      - name: Install the ADLC toolkit
        # Pinned to an exact, audited version — do not use mutable `@latest` on a
        # scheduled runner with repo access. Bump deliberately after reviewing the
        # release. (`--ignore-scripts` blocks install-time scripts; the CLIs are
        # zero-dependency, so nothing legitimate needs them.)
        run: npm install -g --ignore-scripts @adlc/cli@1.1.0

      # The two checks below are ADVISORY, but a check that *crashes* must not be
      # mistaken for a clean run. Each captures the tool's real exit code, records
      # it in the summary, and DISTINGUISHES expected advisory states (which keep
      # the job green) from an UNEXPECTED crash (command-not-found, regression),
      # which FAILS the step so maintainers get the standard failure alert.
      - name: Skill rot (stale validation metadata)
        run: |
          {
            echo "## Skill rot"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          crash=0
          for dir in skills .claude/skills; do
            [ -d "$dir" ] || continue
            # Capture in an `if` so an expected nonzero exit (stale=2, info=1) does
            # NOT abort the step under the Actions shell's `set -e`.
            if out="$(adlc skill-rot "$dir" --json)"; then rc=0; else rc=$?; fi
            echo "$out" >> "$GITHUB_STEP_SUMMARY"
            case "$rc" in
              0) echo "($dir: skills fresh)" >> "$GITHUB_STEP_SUMMARY" ;;
              2) echo "($dir: STALE skill metadata — re-validate)" >> "$GITHUB_STEP_SUMMARY" ;;
              1) if printf '%s' "$out" | grep -q 'nothing to verify'; then
                   echo "($dir: no skills carry validation metadata — informational)" >> "$GITHUB_STEP_SUMMARY"
                 else
                   echo "::error title=skill-rot::skill-rot on $dir exited 1 unexpectedly (not 'nothing to verify')"
                   echo "($dir: skill-rot CRASHED — see error)" >> "$GITHUB_STEP_SUMMARY"
                   crash=1
                 fi ;;
              *) echo "::error title=skill-rot::skill-rot on $dir exited $rc unexpectedly"
                 echo "($dir: skill-rot CRASHED ($rc) — see error)" >> "$GITHUB_STEP_SUMMARY"
                 crash=1 ;;
            esac
          done
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          # Advisory states (fresh/stale/no-metadata) stay green; a genuine crash
          # fails the job so it is not silently swallowed.
          [ "$crash" -eq 0 ] || exit 1

      - name: Model ratchet (hot files to re-prosecute)
        run: |
          {
            echo "## Hot files (re-prosecution candidates)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          # `if` capture so a nonzero exit does not abort the step under `set -e`.
          if out="$(adlc model-ratchet --dry-run --json)"; then rc=0; else rc=$?; fi
          echo "$out" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          # model-ratchet --dry-run is a plan, not a gate: exit 0 is the only
          # expected code. Anything else is a regression — fail so it is not
          # silently swallowed (the job is advisory, but a crash is not advisory).
          if [ "$rc" -ne 0 ]; then
            echo "::error title=model-ratchet::model-ratchet --dry-run exited $rc unexpectedly"
            exit 1
          fi
